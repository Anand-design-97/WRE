
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/css/base.css">
    <link rel="stylesheet" href="../assets/css/var.css">
    <!-- <link rel="stylesheet" href="http://localhost:5173/__merged__.css"> -->
    <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-design@latest/index.css"> -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<style>

.badge{padding:5px 12px;border-radius:20px;letter-spacing:0.5px;}
.badge-new{background:#fffbeb;color:#b45309;}
.badge-trending{background:#eff6ff;color:#1d4ed8;}
.icon-sm{font-size:16px;color:var(--c-6);}
.avatar{width:38px;height:38px;font-size:13px;}
.card-title{font-size:clamp(16px,2.2vw,22px);line-height:1.3;}

</style>

</head>
<body style="display: flex; justify-content: center;margin-top: 10px;">
<article ag-c="{blog.agc}" class="b-r-4 s-bc-c-3 s-d-f s-f-ai-s s-f-fd-c blog-template-2">
    <figure class="s-o-h s-p-r b-r-2">
        <img class="s-w-100 s-h-100 s-of-cv s-d-b a-r-12" data-ratio="92 : 45" src="{blog.imageUrl}" alt="{blog.heading}" loading="lazy">
    </figure>
    <div class="s-d-f s-f-fd-c s-f-fg-1 p-16 s-h-100">
        <h3 class="t-h-2 f-w-7 c-1 m-tb-8 f-s-6">{blog.heading}</h3>
        <p class="s-f f-s-3 f-w-5 c-1 m-t-8 m-b-16 s-l-c-4">{blog.description}</p>
        <span class="f-s-1 f-w-5 c-7 s-ws-nw b-b p-b-16">{blog.pubDate}</span>
        <a href="{blog.link}"  title="READ MORE" class="ani-aro btn-4 s-u-l s-tt-u s-w-fc m-t-16" data-agora-icon-right="&#xf061;">READ MORE</a>
    </div>
</article>
</body>
</html>
