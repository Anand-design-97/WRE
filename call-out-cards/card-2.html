         <article ag-c="{callout.agc}" class="s-p-r s-d-f s-f-fd-c ca-sl b-r-4 s-o-h p-0 s-a-n">
            <figure class="s-o-h s-p-r ca-ol ">
                <img data-ratio="53 : 29" class="s-w-100 s-of-cv s-d-b a-r-3" src="{callout.image}" alt="{callout.heading}" title="{callout.heading}">
            </figure>
            <header class="sub-cont p-30 s-f-fg-1 s-bc-c-3 ">
                <h2 class="t-h-2 m-0 p-0 f-w-5 c-2 p-b-16">{callout.heading}</h2>
                <p class="f-s-3 c-100 s-l-c-4">{callout.description}</p>
                <span role="button" data-url="{callout.goToUrl}" data-target="{callout.goToTarget}" class="btn-2  m-t-8 s-c-p">{callout.buttonLabel}</span>

            </header>
        </article>
