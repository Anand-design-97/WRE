<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/assets/css/main.css">
    <script src="/assets/js/main.js" defer></script>
    <style>

    </style>
</head>

<body>

    <div id="windermere-agent"></div>
    <div id="send-us"></div>
    <div id="have-agent"></div>
    <div id="next-move"></div>
    <div id="footer"></div>

    <script>
        function loadHTML(id, file) {
            fetch(file)
                .then(res => res.text())
                .then(data => {
                    document.getElementById(id).innerHTML = data;
                });
        }

        loadHTML("windermere-agent", "windermere-agent.html");
        loadHTML("send-us", "send-us.html");
        loadHTML("have-agent", "have-agent.html");
        loadHTML("next-move", "next-move.html");
        loadHTML("footer", "../home-page/Footer_1.html");
    </script>
</body>

</html>
