
      
        <!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />

   
       <link rel="stylesheet" href="/assets/css/font.css">
    <script src="/assets/js/main.js" defer></script>

    <title>card-1</title>

    <style>
        .profile-pic {aspect-ratio: 1/1;}
    </style>

</head>

<body>
    <div ag-r="" ag-c="3/3 4/4 8/8 11/12 16/16">
        <article ag-r="" ag-c="3/3 4/4 8/8 11/12 8/16" class="s-m-a bg-c-99 b-r-2 p-8">
            <div ag-c="3/3 1/4 1/8 2/12 2/16" class="">
                <figure class="profile-pic s-o-h im-w-100 s-mw-100 p-0"> <img loading="lazy"
                        data-src="../assets/image/7DB26E61-026E-44D4-A2A7-B281CFD1E5C6_5.png"
                        alt="Agent Photo" title="The Agency" data-ratio-auto=""
                        class="s-of-cv s-d-b s-w-100 s-h-100 b-r-r a-r-6 ag-lazy ag-lazy-s"
                        src="../assets/image/7DB26E61-026E-44D4-A2A7-B281CFD1E5C6_5.png"> </figure>
            </div>
            <div ag-c="3/3 3/4 7/8 10/12 14/16">
                <p class="f-s-3 s-l-c-4 s-ta-l l-h-3 m-t-0 "> “The Windermere team exceeded our expectations at every turn. Their marketing strategy was comprehensive and our home sold above asking price in just two weeks.”</p>
                <p class="c-1 f-s-4 f-w-5 s-ta-l l-h-3 p-f m-b-0">MARY'S PLACE</p>
                <span class="c-1 f-s-2 s-ta-l m-b-0 m-t-8 f-w-4">Emergency Family Shelter</span>
            </div>
        </article>

        <article ag-r="" ag-c="{testimonial.agc}" class="s-m-a bg-c-99 b-r-2 p-8">
            <div ag-c="3/3 1/4 1/8 2/12 2/16" class="">
                <figure class="profile-pic s-o-h im-w-100 s-mw-100 p-0"> <img loading="lazy"
                       
                       alt="{testimonial.image}" title="{testimonial.image}" data-ratio="1:1"
                        class="s-of-cv s-d-b s-w-100 s-h-100 b-r-r a-r-6 "
                        src="{testimonial.image}"> </figure>
            </div>
            <div ag-c="3/3 3/4 7/8 10/12 14/16">
                <p class="f-s-3 s-l-c-4 s-ta-l l-h-3 m-t-0 "> “{testimonial.quote}”</p>
                <p class="c-1 f-s-4 f-w-5 s-ta-l l-h-3 p-f m-b-0">{testimonial.name}</p>
                <span class="c-1 f-s-2 s-ta-l m-b-0 m-t-8 f-w-4">{testimonial.role}</span>
            </div>
        </article>
        
       
            </div>
</body>

</html>
